<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>佩索阿宇宙 · Universo Pessoa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    color: #d4cfc4;
    font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: none;
    -webkit-overflow-scrolling: touch;
  }

  #canvas-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 30px;
    background: linear-gradient(to bottom, rgba(10,10,18,0.95) 0%, rgba(10,10,18,0) 100%);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  .title-bar > * { pointer-events: auto; }

  .main-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 4px;
    color: #e8e0d0;
  }

  .main-title span {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.5;
    display: block;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 520px;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid rgba(200,190,170,0.2);
    border-radius: 20px;
    background: rgba(20,20,30,0.6);
    color: #b0a890;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Noto Serif SC', serif;
    backdrop-filter: blur(10px);
  }

  .filter-btn:hover {
    border-color: rgba(200,190,170,0.5);
    color: #e8e0d0;
  }

  .filter-btn.active {
    background: rgba(200,190,170,0.15);
    border-color: rgba(200,190,170,0.5);
    color: #e8e0d0;
  }

  .detail-panel {
    position: fixed;
    right: -460px;
    top: 0;
    width: 440px;
    height: 100vh;
    background: linear-gradient(135deg, rgba(15,15,25,0.97) 0%, rgba(20,18,30,0.97) 100%);
    border-left: 1px solid rgba(200,190,170,0.1);
    z-index: 200;
    transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    backdrop-filter: blur(20px);
  }

  .detail-panel.open { right: 0; }

  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: rgba(200,190,170,0.2); border-radius: 2px; }

  .panel-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(200,190,170,0.2);
    border-radius: 50%;
    background: transparent;
    color: #b0a890;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.3s;
    z-index: 10;
  }

  .panel-close:hover {
    border-color: rgba(200,190,170,0.5);
    color: #e8e0d0;
  }

  .panel-header {
    padding: 40px 30px 20px;
    border-bottom: 1px solid rgba(200,190,170,0.08);
  }

  .panel-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: #e8e0d0;
    margin-bottom: 4px;
  }

  .panel-name-pt {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: rgba(200,190,170,0.5);
    margin-bottom: 10px;
  }

  .panel-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .panel-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .tag-major { background: rgba(180,140,60,0.15); color: #c8a84a; border: 1px solid rgba(180,140,60,0.3); }
  .tag-semi { background: rgba(100,140,180,0.15); color: #6a9cc8; border: 1px solid rgba(100,140,180,0.3); }
  .tag-minor { background: rgba(140,100,160,0.15); color: #a882b8; border: 1px solid rgba(140,100,160,0.3); }
  .tag-ortonym { background: rgba(200,180,140,0.15); color: #d4c498; border: 1px solid rgba(200,180,140,0.3); }
  .tag-lang { background: rgba(80,160,120,0.12); color: #6ab890; border: 1px solid rgba(80,160,120,0.25); }

  .panel-section {
    padding: 20px 30px;
    border-bottom: 1px solid rgba(200,190,170,0.06);
  }

  .panel-section:last-child { border-bottom: none; }

  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,190,170,0.4);
    margin-bottom: 12px;
  }

  .section-text {
    font-size: 14px;
    line-height: 1.8;
    color: #c0b8a8;
  }

  .section-text em {
    color: #d4c498;
    font-style: italic;
  }

  .works-list {
    list-style: none;
  }

  .works-list li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(200,190,170,0.04);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .works-list li:last-child { border-bottom: none; }

  .work-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: #d4c498;
  }

  .work-year {
    font-size: 11px;
    color: rgba(200,190,170,0.4);
    white-space: nowrap;
  }

  .work-desc {
    font-size: 12px;
    color: rgba(200,190,170,0.5);
    margin-top: 2px;
  }

  .quote-block {
    padding: 16px 20px;
    border-left: 2px solid rgba(200,180,140,0.3);
    margin: 8px 0;
    background: rgba(200,180,140,0.03);
    font-style: italic;
    font-size: 14px;
    line-height: 1.8;
    color: #c8b888;
  }

  .quote-block .quote-src {
    display: block;
    margin-top: 8px;
    font-style: normal;
    font-size: 11px;
    color: rgba(200,190,170,0.4);
  }

  .relations-list {
    list-style: none;
  }

  .relations-list li {
    padding: 6px 0;
    font-size: 13px;
    color: #b0a890;
  }

  .relations-list .rel-target {
    color: #d4c498;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(200,180,140,0.3);
    text-underline-offset: 3px;
  }

  .relations-list .rel-target:hover {
    text-decoration-color: rgba(200,180,140,0.7);
  }

  .tooltip {
    position: absolute;
    padding: 8px 14px;
    background: rgba(20,18,30,0.95);
    border: 1px solid rgba(200,190,170,0.2);
    border-radius: 6px;
    font-size: 13px;
    color: #d4cfc4;
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.2s;
    backdrop-filter: blur(10px);
    font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
  }

  .legend {
    position: fixed;
    bottom: 20px;
    left: 30px;
    z-index: 100;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(200,190,170,0.5);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .bottom-hint {
    position: fixed;
    bottom: 20px;
    right: 30px;
    z-index: 100;
    font-size: 11px;
    color: rgba(200,190,170,0.3);
    letter-spacing: 1px;
  }

  .link-label {
    font-size: 10px;
    fill: rgba(200,190,170,0.35);
    text-anchor: middle;
    pointer-events: none;
    font-family: 'Noto Serif SC', serif;
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* ========== Mobile ========== */
  @media (max-width: 768px) {
    .title-bar {
      flex-direction: column;
      padding: 12px 16px;
      gap: 10px;
      background: linear-gradient(to bottom, rgba(10,10,18,0.97) 0%, rgba(10,10,18,0.8) 70%, rgba(10,10,18,0) 100%);
    }

    .main-title {
      font-size: 18px;
      letter-spacing: 2px;
    }

    .main-title span {
      font-size: 10px;
      letter-spacing: 1px;
    }

    .controls {
      max-width: 100%;
      gap: 5px;
      justify-content: flex-start;
    }

    .filter-btn {
      padding: 4px 10px;
      font-size: 10px;
    }

    .detail-panel {
      width: 100%;
      height: 70vh;
      top: auto;
      bottom: -75vh;
      right: 0;
      left: 0;
      border-left: none;
      border-top: 1px solid rgba(200,190,170,0.15);
      border-radius: 16px 16px 0 0;
      transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .detail-panel.open {
      bottom: 0;
      right: 0;
    }

    .detail-panel::before {
      content: "";
      display: block;
      width: 36px;
      height: 4px;
      background: rgba(200,190,170,0.25);
      border-radius: 2px;
      margin: 10px auto 0;
    }

    .panel-header {
      padding: 20px 20px 14px;
    }

    .panel-name {
      font-size: 24px;
    }

    .panel-name-pt {
      font-size: 14px;
    }

    .panel-section {
      padding: 14px 20px;
    }

    .section-text {
      font-size: 13px;
      line-height: 1.7;
    }

    .work-title {
      font-size: 14px;
    }

    .quote-block {
      font-size: 13px;
      padding: 12px 14px;
    }

    .legend {
      bottom: 10px;
      left: 12px;
      gap: 8px;
      font-size: 9px;
    }

    .legend-dot {
      width: 7px;
      height: 7px;
    }

    .bottom-hint {
      display: none;
    }

    .tooltip {
      display: none;
    }

    .panel-close {
      top: 8px;
      right: 12px;
      width: 28px;
      height: 28px;
      font-size: 16px;
    }
  }

  @media (max-width: 480px) {
    .legend {
      display: none;
    }

    .detail-panel {
      height: 75vh;
      bottom: -80vh;
    }
  }
</style>
</head>
<body>

<div class="title-bar">
  <div class="main-title">
    UNIVERSO PESSOA
  </div>
  <div class="controls">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="major">主要异名者</button>
    <button class="filter-btn" data-filter="semi">半异名者</button>
    <button class="filter-btn" data-filter="minor">次要异名者</button>
    <button class="filter-btn" data-filter="pt">葡语</button>
    <button class="filter-btn" data-filter="en">英语</button>
    <button class="filter-btn" data-filter="fr">法语</button>
  </div>
</div>

<div id="canvas-container"></div>

<div class="detail-panel" id="detailPanel">
  <button class="panel-close" id="panelClose">×</button>
  <div id="panelContent"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#d4c498"></div>正名 (Ortónimo)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c8a84a"></div>主要异名者</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6a9cc8"></div>半异名者</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a882b8"></div>次要异名者</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(200,190,170,0.15); border:1px solid rgba(200,190,170,0.3)"></div>连线 = 关系</div>
</div>

<div class="bottom-hint" id="bottomHint">拖拽移动 · 滚轮缩放 · 点击探索</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const pessoaData = {
  nodes: [
    {
      id: "pessoa",
      name: "费尔南多·佩索阿",
      namePt: "Fernando Pessoa",
      type: "ortonym",
      lang: "pt",
      born: "1888年6月13日，里斯本",
      died: "1935年11月30日，里斯本",
      bio: "葡萄牙诗人、作家、文学评论家、翻译家、出版商和哲学家。20世纪最伟大的葡语诗人，也是世界文学史上最独特的存在之一。他在一只箱子中留下了超过25,000份手稿，创造了超过70个异名者，每个都有独立的传记、写作风格、世界观甚至星盘。",
      style: "以正名写作时，风格偏向象征主义与神秘主义，沉浸于葡萄牙民族身份与命运的思考。诗歌带有精致的音乐性和梦幻般的忧郁。",
      philosophy: "「假装是对感受的最完全的理解」——佩索阿的核心在于通过分裂自我来认识自我，通过创造他者来理解存在。他是所有异名者的造物主，但也承认自己可能只是他们之中最不完整的一个。",
      quote: "我是一座把自己梦成了许多人的城市。",
      quoteSrc: "《不安之书》",
      works: [
        { title: "Mensagem（使命）", year: "1934", desc: "生前唯一出版的葡语诗集，以航海大发现为母题，探索葡萄牙的神秘命运" },
        { title: "35 Sonnets", year: "1918", desc: "以英语写作的十四行诗集" },
        { title: "Antinous", year: "1918", desc: "英语长诗，关于哈德良皇帝与安提诺乌斯" },
        { title: "English Poems I-II, III", year: "1921", desc: "英语诗歌合集" },
        { title: "Erostratus", year: "未刊", desc: "英语随笔" },
        { title: "Sobre Portugal（关于葡萄牙）", year: "遗稿", desc: "关于葡萄牙民族性格的散文" },
        { title: "Páginas de Estética（美学篇章）", year: "遗稿", desc: "美学理论文章" },
        { title: "Poesias（诗集）", year: "1942遗稿", desc: "正名名义下的葡语诗歌总集" }
      ],
      radius: 28
    },
    {
      id: "caeiro",
      name: "阿尔贝托·卡埃罗",
      namePt: "Alberto Caeiro",
      type: "major",
      lang: "pt",
      born: "1889年4月16日，里斯本",
      died: "1915年（肺结核）",
      bio: "佩索阿异名体系中的「大师」(O Mestre)。出生于里斯本，大部分时间在乡间由一位年迈姑妈抚养。几乎没有受过正规教育，中等身材，金发碧眼。在所有异名者中，卡埃罗具有至高的地位——雷伊斯、坎波斯甚至佩索阿本人都自认为是他的弟子。",
      style: "直接、简朴、反修辞。使用自由诗体，拒绝韵律和格律的约束。语言口语化，回避一切隐喻和抽象思辨。他的诗就像呼吸一样自然——事物就是事物本身。",
      philosophy: "绝对的感觉主义/现象学自然主义。万物只是它所呈现的样子：「看就是理解」。他反对一切形而上学、宗教、哲学体系，认为「思考是一种眼病」。他追求一种「感觉的异教」，回归事物的原初纯净。",
      quote: "我没有哲学：我有感官。\n如果我谈论自然，并非因为我知道它是什么，\n而是因为我爱它，而我之所以爱它\n是因为爱的人永远不知道自己爱的是什么\n也不知道为什么爱，也不知道什么是爱。",
      quoteSrc: "《牧羊人》第二首",
      works: [
        { title: "O Guardador de Rebanhos（牧羊人）", year: "1914", desc: "49首诗组成的组诗，卡埃罗的核心作品，包括著名的第八首「基督再临」" },
        { title: "O Pastor Amoroso（恋爱中的牧羊人）", year: "1914后", desc: "一组短诗，描绘卡埃罗罕见的爱情体验" },
        { title: "Poemas Inconjuntos（散落的诗）", year: "1913-1915", desc: "未归入前两部的散落诗篇" }
      ],
      radius: 24
    },
    {
      id: "reis",
      name: "里卡多·雷伊斯",
      namePt: "Ricardo Reis",
      type: "major",
      lang: "pt",
      born: "1887年9月19日，波尔图",
      died: "约1936年后（流亡巴西）",
      bio: "在耶稣会学校接受古典教育，拉丁语学者。自称「拉丁式异教徒」。1919年因政治原因（君主主义者）自我流放至巴西。矮小、纤瘦、略微驼背。佩索阿称他为「一个被造成了贺拉斯而用葡语写作的希腊人」。萨拉马戈后来在《里卡多·雷伊斯去世的那一年》中让他回到了里斯本。",
      style: "严格的古典主义。使用莎孚体、阿尔凯奥斯体等古典格律，语言高度凝练。深受贺拉斯颂诗影响——及时行乐（carpe diem）的主题反复出现，但染上了一层深沉的宿命论色彩。",
      philosophy: "伊壁鸠鲁—斯多葛混合体。接受命运的不可抗拒（Fatum），追求宁静平和（ataraxia），在短暂中寻求永恒的美。他相信异教诸神但不指望它们施恩。「让我们坐在太阳下/直到太阳不再照耀」——在必死性面前保持庄重的平静。",
      quote: "我什么也不想要。诸神给了我一切。\n但是啊，我错了，他们什么也没给。\n我什么也不想要，这就是他们给我的一切。",
      quoteSrc: "雷伊斯颂诗",
      works: [
        { title: "Odes de Ricardo Reis（雷伊斯颂诗）", year: "1914-1935", desc: "以贺拉斯风格写成的颂诗集，近250首，主题围绕命运、死亡、短暂与平静" },
        { title: "Prosa de Ricardo Reis（雷伊斯散文）", year: "遗稿", desc: "包括文学评论和美学论述" }
      ],
      radius: 22
    },
    {
      id: "campos",
      name: "阿尔瓦罗·德·坎波斯",
      namePt: "Álvaro de Campos",
      type: "major",
      lang: "pt",
      born: "1890年10月15日，塔维拉（阿尔加维）",
      died: "不详",
      bio: "苏格兰留学的造船工程师。高瘦、微微驼背，单片眼镜，好似一位葡萄牙犹太人。他是异名者中最激情澎湃、最矛盾、也最「现代」的一个。从早期的颓废主义，到激进的未来主义，再到深刻的虚无主义——他经历了最完整的灵魂变迁。佩索阿戏称他「什么都不是的工程师」。",
      style: "早期受象征主义/颓废派影响（《鸦片吸食者》），中期爆发出惠特曼式的宇宙感觉主义（感觉主义宣言），长句奔涌、排比狂放（《海事颂》《凯旋颂》），晚期转向内省、疲倦、存在主义式的虚无。是佩索阿所有异名者中最敢于\"嚎叫\"的声音。",
      philosophy: "感觉主义（Sensacionismo）的理论代表。早期宣称「感受一切/以一切方式感受」，追求将所有感觉推向极限。后期陷入深刻的幻灭——一切感觉终归虚无。他的轨迹从肯定滑向否定，从狂喜滑向疲倦，最终落入那间著名的烟草铺。",
      quote: "我什么也不是。\n我永远也不会成为什么。\n我无法想要成为什么。\n除此之外，我把世界的所有梦想都装在心里。",

  stars.append("circle")
    .attr("cx", Math.random() * width)
    .attr("cy", Math.random() * height)
    .attr("r", Math.random() * 1.2 + 0.2)
    .attr("fill", "#fff")
    .attr("opacity", Math.random() * 0.3 + 0.05)
    .style("animation", `pulseGlow ${3 + Math.random() * 4}s ease-in-out infinite`)
    .style("animation-delay", `${Math.random() * 5}s`);
}

const g = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on("zoom", (event) => {
    g.attr("transform", event.transform);
  });

svg.call(zoom);

const isMobile = width < 768;
const scale = Math.min(width, height) / 900;

function radialTarget(d) {
  const base = isMobile ? 0.7 : 1;
  if (d.type === "ortonym") return 0;
  if (d.type === "major") return 160 * base * scale;
  if (d.type === "semi") return 260 * base * scale;
  return 420 * base * scale;
}

const simulation = d3.forceSimulation(pessoaData.nodes)
  .force("link", d3.forceLink(pessoaData.links).id(d => d.id).distance(d => {
    const s = isMobile ? 0.65 : 1;
    if (d.type === "master") return 140 * s;
    if (d.type === "creator") return 160 * s;
    if (d.type === "family") return 60 * s;
    if (d.type === "contemporary") return 55 * s;
    return 100 * s;
  }).strength(d => {
    if (d.type === "family" || d.type === "contemporary") return 0.7;
    if (d.type === "master") return 0.5;
    return 0.3;
  }))
  .force("charge", d3.forceManyBody()
    .strength(d => {
      const m = isMobile ? 0.5 : 1;
      return (d.type === "ortonym" ? -1200 : d.type === "major" ? -500 : d.type === "semi" ? -300 : -120) * m;
    })
    .distanceMax(isMobile ? 300 : 500))
  .force("radial", d3.forceRadial(d => radialTarget(d), width / 2, height / 2)
    .strength(d => d.type === "ortonym" ? 1 : d.type === "major" ? 0.3 : d.type === "semi" ? 0.2 : 0.08))
  .force("center", d3.forceCenter(width / 2, height / 2).strength(0.03))
  .force("collision", d3.forceCollide().radius(d => d.radius + (isMobile ? 10 : 18)).strength(0.8));

const linkGroup = g.append("g").attr("class", "links");
const linkLines = linkGroup.selectAll("line")
  .data(pessoaData.links)
  .join("line")
  .attr("stroke", d => linkColors[d.type] || "rgba(200,190,170,0.1)")
  .attr("stroke-width", d => d.type === "master" ? 1.5 : 0.8)
  .attr("stroke-dasharray", d => d.type === "debate" ? "4,4" : "none");

const linkLabels = linkGroup.selectAll("text")
  .data(pessoaData.links)
  .join("text")
  .attr("class", "link-label")
  .text(d => d.label)
  .attr("opacity", 0);

const nodeGroup = g.append("g").attr("class", "nodes");

const nodeGs = nodeGroup.selectAll("g")
  .data(pessoaData.nodes)
  .join("g")
  .attr("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragStarted)
    .on("drag", dragged)
    .on("end", dragEnded));

nodeGs.append("circle")
  .attr("class", "node-glow")
  .attr("r", d => d.radius * 2)
  .attr("fill", d => `url(#glow-${d.id})`)
  .attr("opacity", d => d.type === "minor" ? 0.15 : d.type === "semi" ? 0.25 : 0.35);

nodeGs.append("circle")
  .attr("class", "node-core")
  .attr("r", d => d.radius)
  .attr("fill", d => {
    const c = typeColors[d.type];
    return c;
  })
  .attr("opacity", 0.85)
  .attr("stroke", d => typeColors[d.type])
  .attr("stroke-width", 1)
  .attr("stroke-opacity", 0.5);

nodeGs.append("text")
  .attr("class", "label-zh")
  .attr("dy", d => d.radius + 16)
  .attr("text-anchor", "middle")
  .attr("fill", d => typeColors[d.type])
  .attr("font-size", d => d.type === "ortonym" ? "13px" : d.type === "major" || d.type === "semi" ? "12px" : "10px")
  .attr("font-family", "'Noto Serif SC', serif")
  .attr("opacity", d => d.type === "minor" && d.radius <= 7 ? 0 : d.type === "minor" ? 0.5 : 0.85)
  .text(d => d.name);

nodeGs.append("text")
  .attr("class", "label-pt")
  .attr("dy", d => d.radius + 30)
  .attr("text-anchor", "middle")
  .attr("fill", "rgba(200,190,170,0.35)")
  .attr("font-size", "9px")
  .attr("font-family", "'Cormorant Garamond', serif")
  .attr("font-style", "italic")
  .attr("opacity", d => d.type === "minor" ? 0 : 1)
  .text(d => d.namePt);

const tooltip = document.getElementById("tooltip");
const detailPanel = document.getElementById("detailPanel");
const panelContent = document.getElementById("panelContent");
const panelClose = document.getElementById("panelClose");

const connectedIds = new Set();
let touchedNode = null;

if (isMobile) {
  nodeGs.on("touchstart", function(event, d) {
    event.preventDefault();
    event.stopPropagation();
    if (touchedNode === d.id) {
      openPanel(d);
    } else {
      touchedNode = d.id;
      highlightNode(d, this);
    }
  }, { passive: false });

  svg.on("touchstart", function(event) {
    if (event.target.tagName === "rect" || event.target.tagName === "svg") {
      touchedNode = null;
      resetHighlight();
      detailPanel.classList.remove("open");
    }
  });
}

function highlightNode(d, el) {
  connectedIds.clear();
  connectedIds.add(d.id);
  pessoaData.links.forEach(l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    if (sid === d.id) connectedIds.add(tid);
    if (tid === d.id) connectedIds.add(sid);
  });

  d3.select(el).select(".node-core")
    .transition().duration(200).attr("opacity", 1).attr("r", d.radius * 1.2);
  d3.select(el).select(".node-glow")
    .transition().duration(200).attr("opacity", 0.7);
  d3.select(el).select(".label-zh")
    .transition().duration(200).attr("opacity", 1);
  d3.select(el).select(".label-pt")
    .transition().duration(200).attr("opacity", 1);

  nodeGs.filter(n => !connectedIds.has(n.id))
    .transition().duration(200).attr("opacity", 0.08);
  nodeGs.filter(n => connectedIds.has(n.id))
    .transition().duration(200).attr("opacity", 1);

  linkLabels
    .filter(l => l.source.id === d.id || l.target.id === d.id)
    .transition().duration(200).attr("opacity", 1);
  linkLines
    .filter(l => l.source.id === d.id || l.target.id === d.id)
    .transition().duration(200).attr("stroke-opacity", 1).attr("stroke-width", 2.5);
  linkLines
    .filter(l => l.source.id !== d.id && l.target.id !== d.id)
    .transition().duration(200).attr("stroke-opacity", 0.03);
}

function resetHighlight() {
  nodeGs.transition().duration(300).attr("opacity", 1);
  nodeGs.each(function(d) {
    d3.select(this).select(".node-core")
      .transition().duration(300).attr("opacity", 0.85).attr("r", d.radius);
    d3.select(this).select(".node-glow")
      .transition().duration(300).attr("opacity", d.type === "minor" ? 0.15 : d.type === "semi" ? 0.25 : 0.35);
    d3.select(this).select(".label-zh")
      .transition().duration(300).attr("opacity", d.type === "minor" && d.radius <= 7 ? 0 : d.type === "minor" ? 0.5 : 0.85);
    d3.select(this).select(".label-pt")
      .transition().duration(300).attr("opacity", d.type === "minor" ? 0 : 1);
  });
  linkLabels.transition().duration(300).attr("opacity", 0);
  linkLines.transition().duration(300).attr("stroke-opacity", 1).attr("stroke-width", d => d.type === "master" ? 1.5 : 0.8);
}

nodeGs.on("mouseover", function(event, d) {
  if (isMobile) return;
  tooltip.style.opacity = "1";
  tooltip.innerHTML = `<strong>${d.name}</strong><br><span style="opacity:0.6;font-style:italic">${d.namePt}</span>`;

  connectedIds.clear();
  connectedIds.add(d.id);
  pessoaData.links.forEach(l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    if (sid === d.id) connectedIds.add(tid);
    if (tid === d.id) connectedIds.add(sid);
  });

  d3.select(this).select(".node-core")
    .transition().duration(200)
    .attr("opacity", 1)
    .attr("r", d.radius * 1.2);
  d3.select(this).select(".node-glow")
    .transition().duration(200)
    .attr("opacity", 0.7);
  d3.select(this).select(".label-zh")
    .transition().duration(200)
    .attr("opacity", 1);
  d3.select(this).select(".label-pt")
    .transition().duration(200)
    .attr("opacity", 1);

  nodeGs.filter(n => !connectedIds.has(n.id))
    .transition().duration(200)
    .attr("opacity", 0.08);

  linkLabels
    .filter(l => l.source.id === d.id || l.target.id === d.id)
    .transition().duration(200).attr("opacity", 1);
  linkLines
    .filter(l => l.source.id === d.id || l.target.id === d.id)
    .transition().duration(200).attr("stroke-opacity", 1).attr("stroke-width", 2.5);
  linkLines
    .filter(l => l.source.id !== d.id && l.target.id !== d.id)
    .transition().duration(200).attr("stroke-opacity", 0.03);
});

nodeGs.on("mousemove", function(event) {
  if (isMobile) return;
  tooltip.style.left = (event.pageX + 15) + "px";
  tooltip.style.top = (event.pageY - 10) + "px";
});

nodeGs.on("mouseout", function(event, d) {
  if (isMobile) return;
  tooltip.style.opacity = "0";

  d3.select(this).select(".node-core")
    .transition().duration(300)
    .attr("opacity", 0.85)
    .attr("r", d.radius);
  d3.select(this).select(".node-glow")
    .transition().duration(300)
    .attr("opacity", 0.3);
  d3.select(this).select(".label-zh")
    .transition().duration(300)
    .attr("opacity", d.type === "minor" && d.radius <= 7 ? 0 : d.type === "minor" ? 0.5 : 0.85);
  d3.select(this).select(".label-pt")
    .transition().duration(300)
    .attr("opacity", d.type === "minor" ? 0 : 1);

  nodeGs.transition().duration(300).attr("opacity", 1);

  linkLabels.transition().duration(300).attr("opacity", 0);
  linkLines.transition().duration(300)
    .attr("stroke-opacity", 1)
    .attr("stroke-width", d => d.type === "master" ? 1.5 : 0.8);
});

nodeGs.on("click", function(event, d) {
  event.stopPropagation();
  openPanel(d);
});

panelClose.addEventListener("click", () => {
  detailPanel.classList.remove("open");
});

svg.on("click", () => {
  detailPanel.classList.remove("open");
});

function openPanel(d) {
  const typeLabel = { ortonym: "正名 Ortónimo", major: "主要异名者 Heterónimo Principal", semi: "半异名者 Semi-Heterónimo", minor: "次要异名者 Heterónimo Menor" };
  const langLabel = { pt: "葡萄牙语", en: "英语", fr: "法语", de: "德语" };
  const tagClass = { ortonym: "tag-ortonym", major: "tag-major", semi: "tag-semi", minor: "tag-minor" };

  let html = `
    <div class="panel-header">
      <div class="panel-name">${d.name}</div>
      <div class="panel-name-pt">${d.namePt}</div>
      <div class="panel-tags">
        <span class="panel-tag ${tagClass[d.type]}">${typeLabel[d.type]}</span>
        <span class="panel-tag tag-lang">${langLabel[d.lang]}</span>
      </div>
    </div>
  `;

  if (d.born || d.died) {
    html += `
      <div class="panel-section">
        <div class="section-title">生卒</div>
        <div class="section-text">
          ${d.born ? `<div>生：${d.born}</div>` : ""}
          ${d.died ? `<div>卒：${d.died}</div>` : ""}
        </div>
      </div>
    `;
  }

  html += `
    <div class="panel-section">
      <div class="section-title">传记</div>
      <div class="section-text">${d.bio}</div>
    </div>
  `;

  if (d.style) {
    html += `
    <div class="panel-section">
      <div class="section-title">写作风格</div>
      <div class="section-text">${d.style}</div>
    </div>
  `;
  }

  if (d.philosophy) {
    html += `
    <div class="panel-section">
      <div class="section-title">哲学 / 世界观</div>
      <div class="section-text">${d.philosophy}</div>
    </div>
  `;
  }

  if (d.quote) {
    html += `
      <div class="panel-section">
        <div class="section-title">名句</div>
        <div class="quote-block">
          ${d.quote.replace(/\n/g, "<br>")}
          ${d.quoteSrc ? `<span class="quote-src">—— ${d.quoteSrc}</span>` : ""}
        </div>
      </div>
    `;
  }

  if (d.works && d.works.length > 0) {
    html += `
      <div class="panel-section">
        <div class="section-title">主要作品</div>
        <ul class="works-list">
          ${d.works.map(w => `
            <li>
              <div>
                <div class="work-title">${w.title}</div>
                ${w.desc ? `<div class="work-desc">${w.desc}</div>` : ""}
              </div>
              <div class="work-year">${w.year}</div>
            </li>
          `).join("")}
        </ul>
      </div>
    `;
  }

  const relatedLinks = pessoaData.links.filter(l =>
    (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
  );
  if (relatedLinks.length > 0) {
    html += `
      <div class="panel-section">
        <div class="section-title">关系网络</div>
        <ul class="relations-list">
          ${relatedLinks.map(l => {
            const otherId = (l.source.id || l.source) === d.id ? (l.target.id || l.target) : (l.source.id || l.source);
            const otherNode = pessoaData.nodes.find(n => n.id === otherId);
            return `<li><span class="rel-target" data-id="${otherId}">${otherNode ? otherNode.name : otherId}</span> — ${l.label}</li>`;
          }).join("")}
        </ul>
      </div>
    `;
  }

  panelContent.innerHTML = html;
  detailPanel.classList.add("open");

  panelContent.querySelectorAll(".rel-target").forEach(el => {
    el.addEventListener("click", () => {
      const targetNode = pessoaData.nodes.find(n => n.id === el.dataset.id);
      if (targetNode) openPanel(targetNode);
    });
  });
}

simulation.on("tick", () => {
  linkLines
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  linkLabels
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);

  nodeGs.attr("transform", d => `translate(${d.x},${d.y})`);
});

function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

let activeFilter = "all";

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyFilter();
  });
});

function applyFilter() {
  nodeGs.transition().duration(400)
    .attr("opacity", d => {
      if (activeFilter === "all") return 1;
      if (activeFilter === "major" && d.type === "major") return 1;
      if (activeFilter === "semi" && d.type === "semi") return 1;
      if (activeFilter === "minor" && d.type === "minor") return 1;
      if (activeFilter === "pt" && d.lang === "pt") return 1;
      if (activeFilter === "en" && d.lang === "en") return 1;
      if (activeFilter === "fr" && d.lang === "fr") return 1;
      if (d.type === "ortonym") return 0.8;
      return 0.08;
    });

  linkLines.transition().duration(400)
    .attr("opacity", d => {
      if (activeFilter === "all") return 1;
      const s = d.source;
      const t = d.target;
      const sMatch = matchFilter(s);
      const tMatch = matchFilter(t);
      return (sMatch && tMatch) ? 1 : 0.03;
    });
}

function matchFilter(node) {
  if (activeFilter === "all") return true;
  if (node.type === "ortonym") return true;
  if (activeFilter === "major") return node.type === "major";
  if (activeFilter === "semi") return node.type === "semi";
  if (activeFilter === "minor") return node.type === "minor";
  if (activeFilter === "pt") return node.lang === "pt";
  if (activeFilter === "en") return node.lang === "en";
  if (activeFilter === "fr") return node.lang === "fr";
  return false;
}

const initScale = isMobile ? 0.55 : 0.75;
const initTx = isMobile ? width * 0.22 : width * 0.1;
const initTy = isMobile ? height * 0.18 : height * 0.08;
svg.call(zoom.transform, d3.zoomIdentity.translate(initTx, initTy).scale(initScale));
</script>
</body>
</html>
